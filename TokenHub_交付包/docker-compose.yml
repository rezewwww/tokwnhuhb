version: "3.8"

services:
  ai-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-model-router
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
